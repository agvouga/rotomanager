# ============================================================
# Fantasy Baseball ROTO Daily Manager — Configuration
# ============================================================
# Copy this file to config.yaml and fill in your values.
# NEVER commit config.yaml to version control.

# ----------------------------------------------------------
# Yahoo Fantasy API
# ----------------------------------------------------------
yahoo:
  client_id: "YOUR_YAHOO_CLIENT_ID"
  client_secret: "YOUR_YAHOO_CLIENT_SECRET"
  league_id: "YOUR_LEAGUE_ID"          # e.g. "423.l.12345"
  game_key: "mlb"                       # "mlb" auto-resolves to current season
  token_file: ".yahoo_token.json"       # cached OAuth token

# ----------------------------------------------------------
# Report Output
# ----------------------------------------------------------
output:
  # Local folder where the daily .md file is written.
  # Point this at a Google Drive / Dropbox / OneDrive synced folder
  # so you can read it from your phone.
  directory: "~/Google Drive/Fantasy Baseball"

  # "overwrite" = same file every day (daily_report.md)
  # "dated"     = keep history (report_2026-04-15.md)
  mode: "overwrite"
  filename: "daily_report.md"           # used when mode is "overwrite"

# ----------------------------------------------------------
# Roster Positions (your league's layout)
# ----------------------------------------------------------
roster_positions:
  hitting:
    - "C"
    - "1B"
    - "2B"
    - "3B"
    - "SS"
    - "OF"
    - "OF"
    - "OF"
    - "Util"
    - "Util"
  pitching:
    - "SP"
    - "SP"
    - "RP"
    - "RP"
    - "P"
    - "P"
    - "P"
    - "P"
  bench: 4
  injured: 3

# ----------------------------------------------------------
# ROTO League Categories (6x6)
# ----------------------------------------------------------
roto_categories:
  hitting:
    - stat: "R"
      name: "Runs"
      higher_is_better: true
    - stat: "HR"
      name: "Home Runs"
      higher_is_better: true
    - stat: "RBI"
      name: "Runs Batted In"
      higher_is_better: true
    - stat: "SB"
      name: "Stolen Bases"
      higher_is_better: true
    - stat: "OBP"
      name: "On-Base Percentage"
      higher_is_better: true
    - stat: "OPS"
      name: "OBP + Slugging"
      higher_is_better: true

  pitching:
    - stat: "W"
      name: "Wins"
      higher_is_better: true
    - stat: "SV"
      name: "Saves"
      higher_is_better: true
    - stat: "K"
      name: "Strikeouts"
      higher_is_better: true
    - stat: "HLD"
      name: "Holds"
      higher_is_better: true
    - stat: "ERA"
      name: "Earned Run Average"
      higher_is_better: false
    - stat: "WHIP"
      name: "Walks + Hits per IP"
      higher_is_better: false

# ----------------------------------------------------------
# Analysis Thresholds
# ----------------------------------------------------------
analysis:
  min_ownership_pct: 5
  hot_streak_days: 14
  max_waiver_suggestions: 10
  max_trade_suggestions: 5
  min_at_bats_recent: 20
  min_innings_pitched_recent: 8.0
  recency_weight: 0.6

# ----------------------------------------------------------
# Report Settings
# ----------------------------------------------------------
report:
  include_explanations: true
  audience: "beginner"
